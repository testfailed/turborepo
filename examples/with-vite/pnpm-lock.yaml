        version: link:../../packages/typescript-config
      eslint:
        specifier: ^8.57.0
        version: 8.57.0
      typescript:
        specifier: 5.5.4
        version: 5.5.4
      vite:
        specifier: ^7.3.2
        version: 7.3.2

  apps/web:
