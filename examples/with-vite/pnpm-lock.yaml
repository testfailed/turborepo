        specifier: ^7.1.0
        version: 7.1.0(eslint@8.57.1)(typescript@5.5.4)
      eslint-config-prettier:
        specifier: ^9.1.0
        version: 9.1.0(eslint@8.57.1)

  packages/typescript-config: {}

  packages/ui:
    devDependencies:
      '@repo/eslint-config':
        specifier: workspace:*
        version: link:../eslint-config
      '@repo/typescript-config':
        specifier: workspace:*
        version: link:../typescript-config
      eslint:
        specifier: ^8.57.0
        version: 8.57.0
      typescript:
