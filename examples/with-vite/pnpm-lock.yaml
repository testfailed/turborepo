      '@repo/ui':
        specifier: workspace:*
        version: link:../../packages/ui
    devDependencies:
      '@repo/eslint-config':
        specifier: workspace:*
        version: link:../../packages/eslint-config
      '@repo/typescript-config':
        specifier: workspace:*
        version: link:../../packages/typescript-config
      eslint:
        specifier: ^8.57.0
        version: 8.57.0
      typescript:
        specifier: 5.5.4
        version: 5.5.4
      vite:
        specifier: ^7.3.2
        version: 7.3.2

  packages/eslint-config:
